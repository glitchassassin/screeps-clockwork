name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: nightly-2026-05-14
  WASM_PACK_VERSION: 0.15.0

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
          components: rust-src, clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'screeps-clockwork'

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null || [ "$(wasm-pack --version)" != "wasm-pack $WASM_PACK_VERSION" ]; then
            cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked --force
          fi
          wasm-pack --version
          rustup target add wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test Rust
        run: cargo test --all-features

      - name: Check generated WASM types
        run: npm run check:wasm-types

      - name: Build
        run: npm run build
