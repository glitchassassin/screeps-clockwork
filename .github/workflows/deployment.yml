name: Publish Package

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  RUST_TOOLCHAIN: nightly-2026-05-14
  WASM_PACK_VERSION: 0.15.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
          components: rust-src

      # Add Rust caching
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'screeps-clockwork'
          cache-directories: 'dist_lib/target/'

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null || [ "$(wasm-pack --version)" != "wasm-pack $WASM_PACK_VERSION" ]; then
            cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked --force
          fi
          wasm-pack --version
          rustup target add wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Add Node dependency caching
      - name: Cache node modules
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      # Cache wasm-pack output
      - name: Cache wasm-pack output
        uses: actions/cache@v6
        with:
          path: wasm
          key: ${{ runner.os }}-wasm-${{ hashFiles('lib/**') }}

      - name: Check generated WASM types
        run: npm run check:wasm-types

      - name: Build
        run: npm run build

      - name: Build docs
        run: npm run build:docs

      - name: Upload dist folder as artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-artifact
          path: dist

      - name: Upload docs folder as artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-artifact
          path: dist_docs
          include-hidden-files: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - uses: actions/download-artifact@v8
        with:
          name: dist-artifact
          path: dist

      - name: Check if version exists
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view $PACKAGE_NAME@$PACKAGE_VERSION version &>/dev/null; then
            echo "Version $PACKAGE_VERSION already exists, skipping publish"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $PACKAGE_VERSION does not exist, will publish"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.exists == 'false'
        run: npm publish

  publish-docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: docs-artifact
          path: dist_docs
      - name: Copy API docs
        run: cp -r ./dist_docs ./docs/api
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: publish-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
